name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # pretest runs the tsc build; tests are node --test over dist/tests.
      - run: npm test
      - name: Copy drift check (dspack-gen#7)
        run: node scripts/check-sync.mjs
